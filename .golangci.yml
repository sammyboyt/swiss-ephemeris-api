run:
  timeout: 5m
  issues-exit-code: 1
  tests: true

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true

linters-settings:
  govet:
    # Enable all govet checks except fieldalignment (minor optimization)
    enable-all: true
    disable:
      - fieldalignment
  unused:
    # Check for unused variables and constants
    go: "1.21"
  golint:
    # Minimal confidence for issues
    min-confidence: 0.8
  gofmt:
    # Simplify code
    simplify: true
  goimports:
    # Put local imports last
    local-prefixes: astral-backend

linters:
  disable-all: true
  enable:
    - gofmt
    - goimports
    - govet
    - ineffassign
    - staticcheck
    - unused
    - varcheck
    - structcheck
    - deadcode
    - gosimple
    - misspell
    - unconvert
