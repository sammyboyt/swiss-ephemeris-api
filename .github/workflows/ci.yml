name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.21"

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: go mod download

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Build Swiss Ephemeris CGO library
        run: make build-sweph

      - name: Run quality checks
        run: make quality

      - name: Run all unit tests (including CGO)
        run: make test-unit-all

      - name: Run integration tests
        run: make test-integration

      - name: Generate coverage (including CGO tests)
        run: make coverage

      - name: Check for build artifacts
        run: |
          if [ -f "astral-backend" ] || [ -f "bin/astral-backend" ] || [ -f "dist/bin/astral-backend" ]; then
            echo "❌ Build artifacts found in repository!"
            exit 1
          fi
          if ls eph/sweph/src/*.o 1> /dev/null 2>&1 || [ -f "eph/sweph/src/libswe.a" ]; then
            echo "❌ Swiss Ephemeris build artifacts found in repository!"
            exit 1
          fi

  docker-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: actions/docker/setup-buildx-action@v3

      - name: Build Docker image
        run: make docker-build

      - name: Test Docker integration
        run: timeout 600 make docker-test || echo "Docker test completed"

      - name: Clean up
        run: make clean
